<div class="icon-zone" style="left:20%; top:20%; --sz:20px;" onclick="openMessage()">
  <div class="sparkle-wrap">
    <span class="spark s1" style="color:#b8a0ff; animation-delay:0.2s;">✦</span>
    <span class="spark s2" style="color:#d4c0ff; animation-delay:1.4s;">✦</span>
    <span class="spark s3" style="color:#b8a0ff; animation-delay:2.6s;">✧</span>
  </div>

    <!-- <span class="icon-lbl" style="color:#ffa020;">LEAVE A MESSAGE_</A></span> -->
    <span class="icon-lbl" style="color:#ffa020;">Hello!</A></span>


</div>

<div id="msg-overlay" onclick="closeMsgOverlay(event)">
  <div id="msg-screen">
    <div id="pip-scanlines"></div>
    <div id="msg-header">
      <span>> LEAVE A MESSAGE_</span>
      <button onclick="closeMsgOverlay()">[ X ]</button>
    </div>
    <div id="msg-body">
      <p class="msg-intro">// say anything. i might read it.</p>
      <div id="msg-form">
        <div class="admin-field">
          <label>// FROM (optional)</label>
          <input id="msg-from" type="text" placeholder="stranger, friend, ghost..."/>
        </div>
        <div class="admin-field">
          <label>// MESSAGE</label>
          <textarea id="msg-text" rows="4" placeholder="..."></textarea>
        </div>
        <div id="msg-status" style="display:none; font-size:11px; letter-spacing:2px; margin-bottom:12px;"></div>
        <button class="admin-btn" onclick="sendMessage()">[ SEND ]</button>
      </div>
    </div>
  </div>
</div>


  <div class="footer-note">
  </div>

<div id="coords" style="position:fixed;top:8px;left:8px;color:#39ff14;font-family:monospace;font-size:12px;z-index:999;background:rgba(0,0,0,0.7);padding:4px 8px;"></div>

<div id="admin-overlay" onclick="closeAdmin(event)">
  <div id="admin-screen">
    <div id="pip-scanlines"></div>

    <div id="admin-header">
      <span>> AUTHENTICATE_</span>
      <button onclick="closeAdmin()">[ X ]</button>
    </div>



    <div id="admin-body">

      <!-- step 1: password -->
      <div id="auth-step">
        <div class="admin-field">
          <label>// ENTER PASSWORD</label>
          <input id="auth-input" type="password" placeholder="________" autocomplete="off"/>
        </div>
        <div id="auth-error" style="display:none; font-size:11px; opacity:0.5; margin-bottom:12px;">
          // ACCESS DENIED_
        </div>
        <button class="admin-btn" onclick="checkPassword()">[ CONFIRM ]</button>
      </div>

      <!-- step 2: add entry form (hidden until auth) -->
      <div id="entry-step" style="display:none;">
        <div class="admin-field">
          <label>// SECTION</label>
          <select id="entry-section" onchange="updateFormFields()">
            <option value="log">log</option>
            <option value="music">music</option>
            <option value="films">films</option>
            <option value="books">books</option>
            <option value="thoughts">thoughts</option>
          </select>
        </div>
        <div id="dynamic-fields"></div>
        <div id="save-status" style="display:none; font-size:11px; opacity:0.6; margin-bottom:12px;"></div>
        <button class="admin-btn" onclick="saveEntry()">[ SAVE ENTRY ]</button>
      </div>

    </div>
  </div>
</div>
