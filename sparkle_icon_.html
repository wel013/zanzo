<style>
.scene {
  position: relative;
  background: #050508;
  border-radius: 12px;
  overflow: hidden;
  width: 100%;

  /* better for 16:9 artwork */
  height: 75vh;
  min-height: 600px;
  max-height: 900px;
}
.scene-img {
  position: absolute;
  inset: 0;

  background-image: url("./pxArt.png");
  background-size: cover;
  background-position: center bottom;
  background-repeat: no-repeat;
}
.bg-note {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 10px;
  color: #222233;
  letter-spacing: 2px;
  white-space: nowrap;
}

.icon-zone {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}
.icon-zone:hover .icon-btn { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); }
.icon-zone:hover .spark { animation-play-state: running !important; opacity: 1 !important; }

.icon-btn {
  width: 38px;
  height: 38px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
  z-index: 2;
}
.icon-lbl {
  font-family: 'Courier New', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  opacity: 0.7;
}

.sparkle-wrap {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 20px;
  pointer-events: none;
  z-index: 3;
}
.spark {
  position: absolute;
  font-size: 10px;
  line-height: 1;
  animation: glint 3s ease-in-out infinite;
}
.s1 { left: 50%; top: 0; animation-delay: 0s;    color: #ffd700; font-size: 11px; }
.s2 { left: 75%; top: 4px; animation-delay: 1s;  color: #fff8c0; font-size: 8px;  }
.s3 { left: 25%; top: 6px; animation-delay: 1.8s; color: #ffd700; font-size: 7px; }

@keyframes glint {
  0%, 100% { opacity: 0;   transform: scale(0.4) rotate(0deg);   }
  40%       { opacity: 1;   transform: scale(1)   rotate(20deg);  }
  60%       { opacity: 0.8; transform: scale(0.9) rotate(45deg);  }
  80%       { opacity: 0;   transform: scale(0.5) rotate(60deg);  }
}
@media (prefers-reduced-motion: reduce) {
  .spark { animation: none; opacity: 0.6; }
}
</style>

<div class="scene">
  <div class="scene-img"></div>
  <div class="bg-note">← your pixel art / ai image goes here as background-image</div>

  <div class="icon-zone" style="left: 11%; top: 52%;">
    <div class="sparkle-wrap">
      <span class="spark s1">✦</span>
      <span class="spark s2">✦</span>
      <span class="spark s3">✧</span>
    </div>
    <div class="icon-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="2" y="3" width="16" height="11" rx="1" stroke="#39ff14" stroke-width="1.2"/>
        <rect x="4" y="5" width="12" height="7" fill="#001400"/>
        <line x1="4" y1="7" x2="16" y2="7" stroke="#39ff14" stroke-width="0.5" opacity="0.4"/>
        <line x1="4" y1="9" x2="16" y2="9" stroke="#39ff14" stroke-width="0.5" opacity="0.4"/>
        <line x1="4" y1="11" x2="12" y2="11" stroke="#39ff14" stroke-width="0.5" opacity="0.4"/>
        <rect x="8" y="14" width="4" height="2" fill="#1a1a1a"/>
        <line x1="6" y1="17" x2="14" y2="17" stroke="#333" stroke-width="1"/>
      </svg>
    </div>
    <span class="icon-lbl" style="color:#39ff14;">log</span>
  </div>

  <div class="icon-zone" style="left: 30%; top: 55%;">
    <div class="sparkle-wrap">
      <span class="spark s1" style="animation-delay:0.6s;">✦</span>
      <span class="spark s2" style="animation-delay:1.6s;">✧</span>
      <span class="spark s3" style="animation-delay:2.2s;">✦</span>
    </div>
    <div class="icon-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="8" stroke="#ff2d7a" stroke-width="1.2"/>
        <circle cx="10" cy="10" r="3" stroke="#ff2d7a" stroke-width="1"/>
        <circle cx="10" cy="10" r="1" fill="#ff2d7a"/>
        <circle cx="7" cy="10" r="7" stroke="#cc2060" stroke-width="0.5" stroke-dasharray="1 2"/>
      </svg>
    </div>
    <span class="icon-lbl" style="color:#ff2d7a;">music</span>
  </div>

  <div class="icon-zone" style="left: 50%; top: 65%; transform: translateX(-50%);">
    <div class="sparkle-wrap">
      <span class="spark s1" style="animation-delay:1.2s; color:#e0dcc8;">✦</span>
      <span class="spark s2" style="animation-delay:2.0s; color:#e0dcc8;">✧</span>
      <span class="spark s3" style="animation-delay:0.4s; color:#c8c4b0;">✦</span>
    </div>
    <div class="icon-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M5 16 L4 8 L8 6 L10 14 Z" fill="#2a2820" stroke="#c8c4a0" stroke-width="0.8"/>
        <path d="M8 15 L7 7 L12 5 L13 13 Z" fill="#1e1c18" stroke="#d4d0b8" stroke-width="0.8"/>
        <line x1="8" y1="9" x2="12" y2="8" stroke="#c8c4a0" stroke-width="0.4"/>
        <line x1="9" y1="11" x2="13" y2="10" stroke="#c8c4a0" stroke-width="0.4"/>
      </svg>
    </div>
    <span class="icon-lbl" style="color:#c8c4a0;">thoughts</span>
  </div>

  <div class="icon-zone" style="left: 67%; top: 50%;">
    <div class="sparkle-wrap">
      <span class="spark s1" style="animation-delay:0.3s; color:#00f5ff;">✦</span>
      <span class="spark s2" style="animation-delay:1.3s; color:#80faff;">✧</span>
      <span class="spark s3" style="animation-delay:2.5s; color:#00f5ff;">✦</span>
    </div>
    <div class="icon-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="4" y="3" width="9" height="13" rx="1" fill="#0a1020" stroke="#00f5ff" stroke-width="1"/>
        <rect x="7" y="5" width="9" height="13" rx="1" fill="#080e1a" stroke="#00a0b0" stroke-width="0.8"/>
        <line x1="9" y1="10" x2="14" y2="10" stroke="#00f5ff" stroke-width="0.5" opacity="0.5"/>
        <line x1="9" y1="13" x2="14" y2="13" stroke="#00f5ff" stroke-width="0.5" opacity="0.3"/>
      </svg>
    </div>
    <span class="icon-lbl" style="color:#00f5ff;">films</span>
  </div>

  <div class="icon-zone" style="left: 84%; top: 48%;">
    <div class="sparkle-wrap">
      <span class="spark s1" style="animation-delay:0.9s; color:#ffa020;">✦</span>
      <span class="spark s2" style="animation-delay:1.9s; color:#ffd080;">✧</span>
      <span class="spark s3" style="animation-delay:0.1s; color:#ffa020;">✦</span>
    </div>
    <div class="icon-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="3" y="13" width="14" height="3" rx="0.5" fill="#7a1818"/>
        <rect x="4" y="9"  width="12" height="4" rx="0.5" fill="#18386a"/>
        <rect x="3" y="5"  width="14" height="4" rx="0.5" fill="#185818"/>
        <line x1="7" y1="5" x2="7" y2="9"   stroke="#286828" stroke-width="0.5"/>
        <line x1="6" y1="9" x2="6" y2="13"  stroke="#1a3a6a" stroke-width="0.5"/>
      </svg>
    </div>
    <span class="icon-lbl" style="color:#ffa020;">books</span>
  </div>
</div>
<p style="text-align:center; font-size:11px; color:var(--color-text-secondary); font-family:var(--font-mono); margin-top:10px;">hover any icon to see the sparkle intensify</p>
